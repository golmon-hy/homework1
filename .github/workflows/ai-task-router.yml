name: AI Task Router - Yamazaki AI Employee Organization

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, ready_for_review]

jobs:
  assign-ai-employee:
    name: Auto-assign AI Employee Task
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Check AGENTS.md
        run: |
          echo "Yamazaki AI Employee Org - Task routing started"
          if [ -f AGENTS.md ]; then echo "OK: AGENTS.md found"; else echo "WARNING: not found"; fi
      - name: Post task assignment comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const employeeMap = {
              'role:secretary':        'Sato (Secretary - schedule, minutes)',
              'role:google-ads':       'Takahashi (Google Ads)',
              'role:meta-ads':         'Tanaka (Meta Ads)',
              'role:health-content':   'Onishi (Health Content)',
              'role:content-strategy': 'Nakajima (Content Strategy)',
              'role:youtube':          'Kawamura (YouTube)',
              'role:health-channel':   'Kuroda (Health Channel)',
              'role:copywriter':       'Kunii (Copywriter)',
              'role:design':           'Nakamura (Design Planner)',
              'role:art-direction':    'Kimura (Art Director)',
              'role:qa':               'Yoshida (QA)',
              'role:knowledge':        'Morita (Knowledge Mgmt)',
              'role:training':         'Suzuki (Skill Dev)',
              'role:legal':            'Tanemachi (Legal)',
            };
            const matched = labels.map(l => employeeMap[l]).filter(Boolean);
            if (matched.length === 0) return;
            const lines = matched.map(e => '- **' + e + '**').join('\n');
            const comment = [
              '## Yamazaki AI Employee Organization - Task Assignment',
              '',
              'Assigned AI employees:',
              '',
              lines,
              '',
              '---',
              '### How to work (Codex or Co-Work)',
              '**Codex:** Load this Issue URL + AGENTS.md, work as the assigned AI employee persona',
              '**Co-Work:** Click "Start working" in Copilot Workspace on this Issue',
              '> After completion, request QA review from Yoshida',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });

  pr-quality-check:
    name: PR Quality Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Post PR review checklist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const branchName = pr.head.ref;
            const match = branchName.match(/^feature\/([^-]+)/);
            const assignee = match ? match[1] : 'unknown';
            const checklist = [
              '## Yamazaki AI Organization - PR Review Checklist',
              '',
              '**Assigned AI Employee**: ' + assignee,
              '**Branch**: `' + branchName + '`',
              '',
              '### Yoshida (QA) Items',
              '- [ ] Comments are appropriately written',
              '- [ ] Output format follows guidelines',
              '- [ ] No typos or errors',
              '',
              '### Tanemachi (Legal) Items',
              '- [ ] No API keys or passwords in code',
              '- [ ] No copyright infringing content',
              '',
              '### Morita (Knowledge) Items',
              '- [ ] Important changes reflected in docs',
              '- [ ] AGENTS.md updated if needed',
            ].join('\n');
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: checklist,
              event: 'COMMENT'
            });

  auto-label:
    name: Auto Label Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    permissions:
      issues: write
    steps:
      - name: Auto-assign labels based on keywords
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const text = (issue.title + ' ' + (issue.body || '')).toLowerCase();
            const labelsToAdd = [];
            const rules = [
              { label: 'role:secretary',        kw: ['secretary', 'schedule', 'minutes'] },
              { label: 'role:google-ads',       kw: ['google ads', 'adwords'] },
              { label: 'role:meta-ads',         kw: ['meta ads', 'facebook', 'instagram'] },
              { label: 'role:health-content',   kw: ['health content', 'healthcare'] },
              { label: 'role:content-strategy', kw: ['content strategy', 'twitter'] },
              { label: 'role:youtube',          kw: ['youtube', 'video', 'channel'] },
              { label: 'role:health-channel',   kw: ['health channel', 'psychology'] },
              { label: 'role:copywriter',       kw: ['copy', 'landing page', 'lp'] },
              { label: 'role:design',           kw: ['design', 'visual'] },
              { label: 'role:art-direction',    kw: ['art direction', 'brand'] },
              { label: 'role:qa',               kw: ['qa', 'quality', 'review', 'check'] },
              { label: 'role:knowledge',        kw: ['knowledge', 'document', 'wiki'] },
              { label: 'role:training',         kw: ['training', 'skill', 'learning'] },
              { label: 'role:legal',            kw: ['legal', 'contract', 'compliance'] },
            ];
            for (const rule of rules) {
              if (rule.kw.some(k => text.includes(k))) labelsToAdd.push(rule.label);
            }
            labelsToAdd.push(text.includes('urgent') ? 'priority:high' : 'priority:medium');
            for (const labelName of labelsToAdd) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: labelName });
              } catch (e) {
                const color = labelName.startsWith('role:') ? '0075ca' : labelName === 'priority:high' ? 'd73a4a' : 'fbca04';
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: labelName, color, description: 'AI Employee Org - ' + labelName });
              }
            }
            await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels: labelsToAdd });
