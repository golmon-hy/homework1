# ==============================================================
# ai-task-router.yml
# 山崎AI社員組織 - AIタスク自動振り分けワークフロー
# Codex / Co-Work 両対応
# ==============================================================

name: 🤖 AI社員タスク自動振り分け

on:
  issues:
      types: [opened, labeled]
        issue_comment:
            types: [created]
              pull_request:
                  types: [opened, ready_for_review]

                  jobs:
                    # ============================================================
                      # JOB 1: Issueのラベルに基づいてAI社員にアサイン
                        # ============================================================
                          assign-ai-employee:
                              name: AI社員へのタスク自動アサイン
                                  runs-on: ubuntu-latest
                                      if: github.event_name == 'issues'
                                          permissions:
                                                issues: write

                                                    steps:
                                                          - name: リポジトリをチェックアウト
                                                                  uses: actions/checkout@v4

                                                                        - name: AGENTS.mdを読み込んで組織構造を確認
                                                                                run: |
                                                                                          echo "=== 山崎AI社員組織 - タスク振り分け開始 ==="
                                                                                                    if [ -f AGENTS.md ]; then
                                                                                                                echo "✅ AGENTS.md を検出しました"
                                                                                                                            # AI社員一覧を表示
                                                                                                                                        grep -A 1 '| [0-9]' AGENTS.md | head -30 || true
                                                                                                                                                  else
                                                                                                                                                              echo "⚠️ AGENTS.md が見つかりません"
                                                                                                                                                                        fi
                                                                                                                                                                        
                                                                                                                                                                              - name: ラベルによるタスク振り分けコメント追加
                                                                                                                                                                                      uses: actions/github-script@v7
                                                                                                                                                                                              with:
                                                                                                                                                                                                        github-token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                  script: |
                                                                                                                                                                                                                              const issue = context.payload.issue;
                                                                                                                                                                                                                                          const labels = issue.labels.map(l => l.name);
                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                  // AI社員マッピング定義
                                                                                                                                                                                                                                                                              const employeeMap = {
                                                                                                                                                                                                                                                                                            'role:secretary':       { name: '佐藤（代表秘書）',         emoji: '📋', desc: 'スケジュール管理・議事録' },
                                                                                                                                                                                                                                                                                                          'role:google-ads':      { name: '高橋（Google広告）',      emoji: '📊', desc: 'Google Ads最適化' },
                                                                                                                                                                                                                                                                                                                        'role:meta-ads':        { name: '田中（Meta広告）',        emoji: '📱', desc: 'Facebook/Instagram広告' },
                                                                                                                                                                                                                                                                                                                                      'role:health-content':  { name: '大西（AI整体note）',      emoji: '💚', desc: '整体・ヘルスケアコンテンツ' },
                                                                                                                                                                                                                                                                                                                                                    'role:content-strategy':{ name: '中島（note・X戦略）',     emoji: '✍️', desc: 'note・X(Twitter)戦略' },
                                                                                                                                                                                                                                                                                                                                                                  'role:youtube':         { name: '川村（AIチャンネル）',     emoji: '🎬', desc: 'YouTube企画・台本' },
                                                                                                                                                                                                                                                                                                                                                                                'role:health-channel':  { name: '黒田（整体心理CH）',      emoji: '🧘', desc: '整体心理チャンネル運営' },
                                                                                                                                                                                                                                                                                                                                                                                              'role:copywriter':      { name: '國井（コピーライター）',   emoji: '✏️', desc: 'LP・セールスコピー' },
                                                                                                                                                                                                                                                                                                                                                                                                            'role:design':          { name: '中村（デザインプランナー）', emoji: '🎨', desc: 'ビジュアルデザイン企画' },
                                                                                                                                                                                                                                                                                                                                                                                                                          'role:art-direction':   { name: '木村（アートディレクター）', emoji: '🖼️', desc: 'ブランドビジュアル' },
                                                                                                                                                                                                                                                                                                                                                                                                                                        'role:qa':              { name: '吉田（品質管理QA）',       emoji: '✅', desc: '成果物品質チェック' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                      'role:knowledge':       { name: '森田（ナレッジ管理）',     emoji: '📚', desc: 'ドキュメント整理' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    'role:training':        { name: '鈴木（スキル開発）',       emoji: '🎓', desc: 'AI活用スキル研修' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  'role:legal':           { name: '種市（法務レビュアー）',   emoji: '⚖️', desc: '法務・コンプライアンス' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      // マッチしたAI社員を探す
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const matched = labels
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .map(l => employeeMap[l])
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              .filter(Boolean);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if (matched.length === 0) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              // アサインコメントを作成
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const assignees = matched.map(e => 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        `- ${e.emoji} **${e.name}** （${e.desc}）`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ).join('\n');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const comment = [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          '## 🤖 山崎AI社員組織 - タスク自動振り分け',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      '以下のAI社員にタスクが割り当てられました:',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  assignees,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              '---',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          '### 📋 作業手順（Codex / Co-Work どちらでも使用可）',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      '**[Codex (OpenAI) を使う場合]**',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    '```',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '1. このIssueのURLとAGENTS.mdを読み込む',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                '2. 担当AI社員のペルソナで作業を開始',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              '3. agents/ ディレクトリの対応ファイルを参照',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            '```',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        '**[Co-Work (GitHub Copilot Workspace) を使う場合]**',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      '```',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    '1. このIssueを開いてCopilot Workspaceで「Start working」',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '2. .github/copilot-instructions.md が自動読み込みされる',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                '3. 担当AI社員として作業を進める',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              '```',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          '> 📌 完了後はQA（吉田）にレビュー依頼をしてください',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ].join('\n');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              await github.rest.issues.createComment({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        issue_number: issue.number,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      body: comment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          console.log(`✅ タスク振り分けコメントを追加しました`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # ============================================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # JOB 2: PR作成時の品質チェック自動通知
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # ============================================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  pr-quality-check:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      name: PR品質チェック自動通知
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if: github.event_name == 'pull_request'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  permissions:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        pull-requests: write
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: リポジトリをチェックアウト
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: PR品質チェックコメント追加
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/github-script@v7
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          github-token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    script: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const pr = context.payload.pull_request;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const branchName = pr.head.ref;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // ブランチ名から担当者を抽出（feature/担当者名-概要 形式）
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const match = branchName.match(/^feature\/([^-]+)/);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const assignee = match ? match[1] : '不明';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const checklist = [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '## ✅ 山崎AI社員組織 - PRレビューチェックリスト',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              `**担当AI社員**: ${assignee}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            `**ブランチ**: \`${branchName}\``,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        '### 吉田（品質管理QA）チェック項目',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      '- [ ] 日本語コメントが適切に記載されている',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    '- [ ] 出力フォーマットが規定通りである',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '- [ ] 誤字・脱字がない',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                '- [ ] 成果物の品質基準を満たしている',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            '### 種市（法務レビュアー）チェック項目',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          '- [ ] APIキー・パスワードがコードに含まれていない',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        '- [ ] 個人情報の取り扱いが適切である',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      '- [ ] 著作権侵害のコンテンツが含まれていない',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    '- [ ] 外部サービスの利用規約に違反していない',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                '### 森田（ナレッジ管理）チェック項目',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              '- [ ] 重要な変更はWiki/ドキュメントに反映済み',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            '- [ ] AGENTS.mdに必要な更新が行われている',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        '---',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    '> 💡 **Codex使用時**: 上記チェック項目をCodexに渡してレビューを依頼できます',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  '> 💡 **Co-Work使用時**: Copilot Chatに `@吉田 このPRをレビューして` と送信',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ].join('\n');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      await github.rest.pulls.createReview({
